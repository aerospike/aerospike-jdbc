name: Promote to Prod

permissions:
  contents: write # For creating releases
  id-token: write # For OIDC authentication

on:
  workflow_dispatch:
    inputs:
      build-number:
        type: string
        description: JFrog build id from the Build and release workflow output (jf-build-id), not the GitHub run number

jobs:
  promote-from-stage-to-prod:
    name: Promote from stage to prod
    uses: ./.github/workflows/promote.yml
    with:
      build-number: ${{ inputs.build-number }}
      target-repository: database-maven-dev-local
      target-branch: main
      source-branch: stage
    secrets: inherit
