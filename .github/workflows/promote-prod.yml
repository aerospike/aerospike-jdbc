name: Promote build to JF dev-local and draft GitHub release

permissions:
  contents: write # For creating releases
  id-token: write # For OIDC authentication

on:
  workflow_dispatch:
    inputs:
      build-number:
        type: string
        description: "JFrog build number: use jf-build-id from Build and release run output."

jobs:
  promote-from-stage-to-prod:
    name: JF build-promote to dev-local + draft GitHub release
    uses: ./.github/workflows/promote.yml
    with:
      build-number: ${{ inputs.build-number }}
      target-repository: database-maven-dev-local
      target-branch: main
    secrets: inherit
