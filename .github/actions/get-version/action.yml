name: Get version
description: Detects if build is a snapshot and gets the release or snapshot version

runs:
  using: composite
  steps:
    - name: Detect if snapshot
      id: get-is-snapshot
      shell: bash
      run: |
        BRANCH="${{ github.ref_name }}"
        echo "Branch: $BRANCH"

        TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "")
        echo "Detected Git tag: '$TAG'"

        RE_PROD='^v?[0-9]+\.[0-9]+\.[0-9]+$'
        RE_RC='^v?[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$'

        if [[ "$TAG" =~ $RE_PROD ]]; then
          echo "Production release tag detected: $TAG"
          echo "is-snapshot=false" >> $GITHUB_OUTPUT
          echo "version-changed=false" >> $GITHUB_OUTPUT
          exit 0
        elif [[ "$TAG" =~ $RE_RC ]]; then
          echo "Release candidate tag detected: $TAG"
          echo "is-snapshot=false" >> $GITHUB_OUTPUT
          echo "version-changed=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        COMMIT_REF="HEAD~1"
        if ! git show "${COMMIT_REF}:pom.xml" &>/dev/null; then
          echo "Error: pom.xml not found in commit ${COMMIT_REF}"
          echo "is-snapshot=true" >> $GITHUB_OUTPUT
          echo "version-changed=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        OLD_VERSION=$(git show "${COMMIT_REF}:pom.xml" | sed -n '0,/<version>/ s/.*<version>\([^<]*\)<\/version>.*/\1/p')
        NEW_VERSION=$(sed -n '0,/<version>/ s/.*<version>\([^<]*\)<\/version>.*/\1/p' pom.xml)

        echo "old version: ${OLD_VERSION}, new version: ${NEW_VERSION}"

        is_rc_version() {
          [[ "$1" =~ -[Rr][Cc][0-9]+$ ]]
        }

        if [[ "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
          echo "version-changed=true" >> $GITHUB_OUTPUT
          if [[ "$BRANCH" == "main" ]]; then
            echo "Version bump on main — release build"
            echo "is-snapshot=false" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "stage" ]] && is_rc_version "${NEW_VERSION}"; then
            echo "RC version bump on stage — release candidate build"
            echo "is-snapshot=false" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "stage" ]]; then
            echo "Semver bump on stage — snapshot build"
            echo "is-snapshot=true" >> $GITHUB_OUTPUT
          else
            echo "Version bump on branch '$BRANCH' — snapshot build"
            echo "is-snapshot=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "version-changed=false" >> $GITHUB_OUTPUT
          echo "No pom version change — snapshot build"
          echo "is-snapshot=true" >> $GITHUB_OUTPUT
        fi

    - name: Get release or snapshot-version
      id: get-release-version
      shell: bash
      run: |
        BRANCH="${{ github.ref_name }}"
        IS_SNAPSHOT=${{ steps.get-is-snapshot.outputs.is-snapshot }}
        VERSION_CHANGED=${{ steps.get-is-snapshot.outputs.version-changed }}
        POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

        is_rc_version() {
          [[ "$1" =~ -[Rr][Cc][0-9]+$ ]]
        }

        if [ "$IS_SNAPSHOT" == "true" ]; then
          if [[ "$VERSION_CHANGED" == "true" && "$BRANCH" == "stage" ]] && ! is_rc_version "${POM_VERSION}"; then
            echo "Stage semver bump — using ${POM_VERSION}-SNAPSHOT"
            echo release-version="${POM_VERSION}-SNAPSHOT" >> $GITHUB_OUTPUT
          elif [[ "$POM_VERSION" == *-SNAPSHOT* ]]; then
            echo release-version="${POM_VERSION}_${GITHUB_SHA}" >> $GITHUB_OUTPUT
          else
            echo release-version="${POM_VERSION}-SNAPSHOT_${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi
        else
          echo release-version="${POM_VERSION}" >> $GITHUB_OUTPUT
        fi

outputs:
  is-snapshot:
    description: Whether this is a snapshot build
    value: ${{ steps.get-is-snapshot.outputs.is-snapshot }}
  release-version:
    description: The release or snapshot version
    value: ${{ steps.get-release-version.outputs.release-version }}
